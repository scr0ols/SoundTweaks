name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Before reporting, please check the [FAQ](https://github.com/scr0ols/SoundTweaks/wiki/FAQ) and existing issues to make sure this hasn't been reported already.

  - type: input
    id: mod-version
    attributes:
      label: SoundTweaks version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "e.g. 26.1.2"
    validations:
      required: true

  - type: input
    id: fabric-loader
    attributes:
      label: Fabric Loader version
      placeholder: "e.g. 0.19.2"
    validations:
      required: true

  - type: input
    id: fabric-api
    attributes:
      label: Fabric API version
      placeholder: "e.g. 0.150.0+26.1.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the SoundTweaks screen
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output from `.minecraft/logs/latest.log` (optional but helpful).
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the [FAQ](https://github.com/scr0ols/SoundTweaks/wiki/FAQ) and my issue is not listed there
          required: true
        - label: I searched existing issues and this has not been reported before
          required: true
        - label: I am using the latest version of SoundTweaks
          required: true
