modLoader = "javafml"
loaderVersion = "[4,)"
license = "GPL-3.0-or-later"

[[mods]]
    modId = "soundtweaks"
    version = "${version}"
    displayName = "SoundTweaks"
    description = '''
Per-sound volume control — mute, amplify or individually adjust any sound in the game.
'''
    logoFile = "assets/soundtweaks/banner.png"
    displayURL = "https://github.com/scr0ols/SoundTweaks/wiki"
    issueTrackerURL = "https://github.com/scr0ols/SoundTweaks/issues"
    authors = "scr0ols"
    credits = "scr0ols"

[[mixins]]
    config = "soundtweaks.mixins.json"

[[dependencies.soundtweaks]]
    modId = "neoforge"
    type = "required"
    versionRange = "[26.1,)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.soundtweaks]]
    modId = "minecraft"
    type = "required"
    versionRange = "[26.1.2,)"
    ordering = "NONE"
    side = "CLIENT"
